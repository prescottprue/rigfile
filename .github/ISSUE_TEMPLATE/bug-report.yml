name: "\U0001F41B Bug Report"
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this! Clear reproduction steps help us fix it faster.

  - type: textarea
    id: description
    attributes:
      label: "\U0001F50D Description"
      description: What happened? What did you expect to happen instead?
      placeholder: "e.g. When I try to upload a photo for my vehicle's avatar, the page hangs and the image never appears on the vehicle detail page..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "\U0001F501 Steps to reproduce"
      description: How can we trigger this bug?
      placeholder: |
        1. Log in as rachel@remix.run
        2. Go to /vehicles/<id>/edit
        3. Choose an image file and click "Save"
        4. Notice that the page never reloads
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "\U0001F3AF Area"
      description: Which part of the app is affected?
      options:
        - Auth (login / join / logout / sessions)
        - Vehicles (CRUD, listing, detail page)
        - Logs (work/maintenance entries)
        - Avatars / file upload (MinIO)
        - Reporting / history
        - Deployment / infrastructure
        - Tests / CI
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "\U0001F6A8 Severity"
      description: How much does this impact your workflow?
      options:
        - "Critical — app is unusable"
        - "High — major feature broken"
        - "Medium — annoying but I can work around it"
        - "Low — cosmetic or minor"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "\U0001F4CB Logs or screenshots"
      description: Paste any relevant error output, console logs, or screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "\U0001F4CE Additional context"
      description: Environment details (browser, OS), git ref, deploy env, or anything else that helps.
    validations:
      required: false
