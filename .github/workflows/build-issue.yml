name: "Build Issue: /build slash command"

on:
  issue_comment:
    types: [created]

jobs:
  build:
    # Only run on issue comments (not PRs) starting with /build, from non-bots
    if: >
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      startsWith(github.event.comment.body, '/build')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write

    steps:
      - name: Acknowledge command
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Trigger build workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const issueNumber = String(context.issue.number);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-next.yml',
              ref: 'main',
              inputs: {
                issue_number: issueNumber
              }
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Build triggered for issue #${issueNumber}. [View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/build-next.yml)`
            });
