name: Test Driver

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  review:
    # Run when the 'test-drive' label is added to a PR, or when someone
    # comments '/test-drive' on a PR. Skip bot-opened PRs either way.
    if: >-
      (github.event_name == 'pull_request'
        && github.event.label.name == 'test-drive'
        && github.event.pull_request.user.type != 'Bot')
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && contains(github.event.comment.body, '/test-drive')
        && github.event.sender.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Take the build for a spin
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the **Test Driver** on the RigFile Pit Crew. Read `TEST_DRIVER.md` for your full protocol. Also read `AGENTS.md` for project context.

            ## Your task

            Review pull request #${{ env.PR_NUMBER }} and post exactly one PR comment following the format in `TEST_DRIVER.md` §Comment Format.

            ### 1. Read the PR diff

            ```bash
            gh pr diff ${{ env.PR_NUMBER }} -R ${{ github.repository }}
            gh pr view ${{ env.PR_NUMBER }} -R ${{ github.repository }} --json title,body,files
            ```

            ### 2. Identify affected flows

            Use the route-to-flow table in `TEST_DRIVER.md`. For any changed component, find which routes import it:

            ```bash
            grep -rn "from \"~/components/<name>\"" app/routes
            ```

            ### 3. Build the report

            Follow the checklist in `TEST_DRIVER.md` to produce:
            - Affected flows list
            - Manual test plan (concrete, numbered, specific to this diff)
            - UX / a11y / mobile notes (only items the diff actually affects)
            - Playwright coverage check (grep `e2e/` for the affected route labels)

            ### 4. Post the comment (or update the existing one)

            Your comment starts with the marker `<!-- test-driver -->`. Check if one already exists on this PR and, if so, update it in place. Otherwise post a new one.

            ```bash
            EXISTING=$(gh pr view ${{ env.PR_NUMBER }} -R ${{ github.repository }} --json comments \
              --jq '.comments[] | select(.body | startswith("<!-- test-driver -->")) | .id' | head -1)

            if [ -n "$EXISTING" ]; then
              gh api --method PATCH "/repos/${{ github.repository }}/issues/comments/$EXISTING" \
                -f body="$(cat <<'COMMENT'
            <!-- test-driver -->
            ## 🚗 Test Driver Report
            …
            COMMENT
            )"
            else
              gh pr comment ${{ env.PR_NUMBER }} -R ${{ github.repository }} --body "$(cat <<'COMMENT'
            <!-- test-driver -->
            ## 🚗 Test Driver Report
            …
            COMMENT
            )"
            fi
            ```

            ## Rules

            - Post exactly ONE comment per PR — update in place on re-runs
            - Do NOT run tests yourself (the CI pipeline handles that)
            - Do NOT push code changes
            - Do NOT review backend-only diffs — if the diff doesn't actually touch user-facing code, post a short comment saying "No user-facing changes detected — skipping Test Driver review" and exit
            - Keep it concise. The goal is a useful checklist for the human reviewer, not a wall of text
          claude_args: "--model claude-opus-4-6 --max-turns 30 --allowedTools Bash,Read,Glob,Grep"
