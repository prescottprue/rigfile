name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vehicle_work_log
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vehicle_work_log"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vehicle_work_log
      SESSION_SECRET: ci-test-secret-must-be-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run migrations
        run: npm run db:migrate

      - name: Vitest
        run: npm test -- --run

      - name: Build (Cloudflare target)
        run: npm run build
