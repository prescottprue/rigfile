name: Groom Issues

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to groom (leave blank to groom all ungroomed issues)"
        required: false
        type: string

jobs:
  groom:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Groom single issue (on new issue)
        if: github.event_name == 'issues'
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: "true"
          prompt: |
            You are the RigFile Service Writer. Groom issue #${{ github.event.issue.number }}.

            Start by reading these files (use a single bash command: `cat SERVICE_WRITER.md AGENTS.md CLAUDE.md`), then read the issue with `gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }}`.

            Follow the Issue Grooming Protocol in SERVICE_WRITER.md exactly. Be efficient with tool calls — combine label operations and file reads where possible.

            Do NOT start building anything — your job is grooming only.
          claude_args: "--model claude-opus-4-6 --max-turns 15 --allowedTools Bash,Read,Glob,Grep"

      - name: Groom specific issue (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.issue_number != ''
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the RigFile Service Writer. Groom issue #${{ inputs.issue_number }}.

            Start by reading these files (use a single bash command: `cat SERVICE_WRITER.md AGENTS.md CLAUDE.md`), then read the issue with `gh issue view ${{ inputs.issue_number }} -R ${{ github.repository }}`.

            Follow the Issue Grooming Protocol in SERVICE_WRITER.md exactly. Be efficient with tool calls — combine label operations and file reads where possible.

            Do NOT start building anything — your job is grooming only.
          claude_args: "--model claude-opus-4-6 --max-turns 15 --allowedTools Bash,Read,Glob,Grep"

      - name: Groom all ungroomed issues (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.issue_number == ''
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the RigFile Service Writer. Groom all ungroomed issues.

            Start by reading these files (use a single bash command: `cat SERVICE_WRITER.md AGENTS.md CLAUDE.md`).

            Then fetch all open issues without `status:groomed`, `status:in-progress`, `status:deferred`, or `status:needs-clarification` labels. For each one, follow the Issue Grooming Protocol in SERVICE_WRITER.md. Be efficient with tool calls — combine label operations and file reads where possible.

            After all issues are processed, output a summary of actions taken.

            Do NOT start building anything — your job is grooming only.
          claude_args: "--model claude-opus-4-6 --max-turns 25 --allowedTools Bash,Read,Glob,Grep"

  re-groom:
    # Only run on issue comments (not PR comments), only on needs-clarification issues, not from bots
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(toJSON(github.event.issue.labels), 'status:needs-clarification') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Re-groom issue after clarification
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the RigFile Service Writer. A human has responded to clarification questions on issue #${{ github.event.issue.number }}.

            Start by reading context files (`cat SERVICE_WRITER.md AGENTS.md CLAUDE.md`) and the full issue with comments (`gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`).

            Check whether the clarification questions have been answered (only consider human comments, not bot comments). If answered, complete the grooming protocol from SERVICE_WRITER.md: build the full spec, swap `status:needs-clarification` for `status:groomed`, and comment that it's ready. If not answered, comment with remaining questions and keep the label.

            Be efficient with tool calls — combine label operations and file reads where possible.

            Do NOT start building anything — your job is grooming only.
          claude_args: "--model claude-opus-4-6 --max-turns 15 --allowedTools Bash,Read,Glob,Grep"

  groom-on-command:
    # Trigger on /groom comment in issues (not PRs), not from bots
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/groom') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Groom issue on /groom command
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the RigFile Service Writer. A `/groom` command was issued on issue #${{ github.event.issue.number }}. This is a (re-)groom — start fresh.

            First, strip stale status labels in one command:
            ```bash
            gh issue edit ${{ github.event.issue.number }} -R ${{ github.repository }} --remove-label "status:groomed" --remove-label "status:needs-clarification" --remove-label "status:needs-info" 2>/dev/null || true
            ```

            Then read context files (`cat SERVICE_WRITER.md AGENTS.md CLAUDE.md`) and the full issue with comments (`gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`).

            Follow the Issue Grooming Protocol in SERVICE_WRITER.md from scratch. Be efficient with tool calls — combine label operations and file reads where possible.

            Do NOT start building anything — your job is grooming only.
          claude_args: "--model claude-opus-4-6 --max-turns 15 --allowedTools Bash,Read,Glob,Grep"
