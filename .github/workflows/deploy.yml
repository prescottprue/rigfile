name: Deploy

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply Drizzle migrations to Neon
        # Neon connection string lives in a repo secret; Drizzle kit runs the
        # same SQL files the app ships with on self-host.
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Build worker bundle
        run: npm run build:cf

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # main → production, dev → staging, no --env flag for prod by default
          command: ${{ github.ref == 'refs/heads/main' && 'deploy' || 'deploy --env staging' }}
