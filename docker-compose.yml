services:
  # Local Postgres for development only.
  # Self-hosters should use the bundled image built by ./Dockerfile instead.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rigfile
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rigfile"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
