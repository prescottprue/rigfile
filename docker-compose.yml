services:
  # Local Postgres for development only.
  # Self-hosters should use the bundled image built by ./Dockerfile instead.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicle_work_log
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicle_work_log"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
